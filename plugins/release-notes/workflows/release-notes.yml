---
name: Generate Release Notes

on:
    # Trigger on release tags matching semver pattern
    push:
        tags:
            - 'v[0-9]+.[0-9]+.[0-9]+*'

    # Allow manual triggering with tag input
    workflow_dispatch:
        inputs:
            tag:
                description: 'The release tag to generate notes for'
                required: true
                type: string
            previous-tag:
                description: 'Override automatic detection of previous release tag'
                required: false
                type: string
            include-internal:
                description: 'Include internal/infrastructure changes'
                required: false
                type: boolean
                default: false

permissions:
    contents: write

jobs:
    generate-release-notes:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0  # Full history for tag comparison

            - name: Determine tag
              id: get-tag
              env:
                GITHUB_EVENT_NAME: ${{ github.event_name }}
                GITHUB_EVENT_INPUTS_TAG: ${{ github.event.inputs.tag }}
                GITHUB_REF_NAME: ${{ github.ref_name }}
              run: |
                  if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
                    echo "tag=$GITHUB_EVENT_INPUTS_TAG" >> $GITHUB_OUTPUT
                  else
                    echo "tag=$GITHUB_REF_NAME" >> $GITHUB_OUTPUT
                  fi

            - name: Generate Release Notes
              id: release-notes
              uses: OpenHands/extensions/plugins/release-notes@main
              with:
                  tag: ${{ steps.get-tag.outputs.tag }}
                  previous-tag: ${{ github.event.inputs.previous-tag || '' }}
                  include-internal: ${{ github.event.inputs.include-internal || 'false' }}
                  output-format: release
                  llm-api-key: ${{ secrets.LLM_API_KEY }}
                  github-token: ${{ secrets.GITHUB_TOKEN }}

            - name: Display generated notes
              env:
                STEPS_GET_TAG_OUTPUTS_TAG: ${{ steps.get-tag.outputs.tag }}
                STEPS_RELEASE_NOTES_OUTPUTS_PREVIOUS_TAG: ${{ steps.release-notes.outputs.previous-tag }}
                STEPS_RELEASE_NOTES_OUTPUTS_COMMIT_COUNT: ${{ steps.release-notes.outputs.commit-count }}
                STEPS_RELEASE_NOTES_OUTPUTS_CONTRIBUTOR_COUNT: ${{ steps.release-notes.outputs.contributor-count }}
                STEPS_RELEASE_NOTES_OUTPUTS_NEW_CONTRIBUTOR_COUNT: ${{ steps.release-notes.outputs.new-contributor-count }}
              run: |
                  echo "## Release Notes for $STEPS_GET_TAG_OUTPUTS_TAG"
                  echo ""
                  echo "Previous tag: $STEPS_RELEASE_NOTES_OUTPUTS_PREVIOUS_TAG"
                  echo "Commits: $STEPS_RELEASE_NOTES_OUTPUTS_COMMIT_COUNT"
                  echo "Contributors: $STEPS_RELEASE_NOTES_OUTPUTS_CONTRIBUTOR_COUNT"
                  echo "New contributors: $STEPS_RELEASE_NOTES_OUTPUTS_NEW_CONTRIBUTOR_COUNT"
                  echo ""
                  echo "---"
                  cat release_notes.md

            - name: Upload release notes artifact
              uses: actions/upload-artifact@v4
              with:
                  name: release-notes-${{ steps.get-tag.outputs.tag }}
                  path: release_notes.md
                  retention-days: 30
